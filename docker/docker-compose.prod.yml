services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    image: ood-api:latest
    container_name: ood-api
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OOD_DOCS_PATH=/var/www/docs
    networks:
      - ood-network
    restart: unless-stopped

networks:
  ood-network:
    driver: bridge
